<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>tattoos — hyn</title>
<meta name="description" content="Fine-line tattoo work — a six-image portfolio.">
<meta name="theme-color" content="#0f0e0d">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230f0e0d'/%3E%3Ccircle cx='8' cy='8' r='2.6' fill='%23f4f1ec'/%3E%3C/svg%3E">
<style>
  html, body { margin: 0; height: 100%; background: #0f0e0d; }
  #stage {
    position: fixed; inset: 0;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  .slide {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    box-sizing: border-box;
    padding: clamp(12px, 2.5vmin, 28px);
    object-fit: contain;
    opacity: 0;
    transition: opacity .28s ease;
  }
  .slide.on { opacity: 1; }
  #counter {
    position: fixed; left: 0; right: 0;
    bottom: max(14px, env(safe-area-inset-bottom));
    text-align: center;
    font: 500 11px/1 ui-sans-serif, system-ui, -apple-system, sans-serif;
    letter-spacing: .18em;
    color: #fff; mix-blend-mode: difference;
    pointer-events: none;
  }
</style>
<noscript><style>
  #stage { position: static; } .slide { position: static; opacity: 1; height: 100dvh; } #counter { display: none; }
</style></noscript>
</head>
<body>
<main id="stage" aria-label="Tattoo slideshow — tap to advance">
  <img class="slide on" src="img/1.jpg" fetchpriority="high" alt="Fine-line hummingbird tattoo in flight, upper arm">
  <img class="slide" src="img/2.jpg" decoding="async" alt="Black-and-grey canine skull tattoo, forearm">
  <img class="slide" src="img/3.jpg" decoding="async" alt="Fine-line sunflower tattoo with falling petals, forearm">
  <img class="slide" src="img/4.jpg" decoding="async" alt="Fine-line orchid branch tattoo, upper arm">
  <img class="slide" src="img/5.jpg" decoding="async" alt="Bold blackwork leaping bull tattoo, forearm">
  <img class="slide" src="img/6.jpg" decoding="async" alt="Black-and-grey pigeon tattoo, inner arm">
  <div id="counter" aria-live="polite">1 / 6</div>
</main>
<script>
  const slides = [...document.querySelectorAll('.slide')];
  const counter = document.getElementById('counter');
  let i = 0, downX = null;

  function show(n) {
    slides[i].classList.remove('on');
    i = (n + slides.length) % slides.length;
    slides[i].classList.add('on');
    counter.textContent = (i + 1) + ' / ' + slides.length;
  }

  const stage = document.getElementById('stage');
  let swiped = false;
  stage.addEventListener('touchstart', e => { downX = e.changedTouches[0].clientX; swiped = false; }, { passive: true });
  stage.addEventListener('touchend', e => {
    if (downX === null) return;
    const dx = e.changedTouches[0].clientX - downX; downX = null;
    if (Math.abs(dx) >= 40) { swiped = true; show(i + (dx < 0 ? 1 : -1)); }
  }, { passive: true });
  stage.addEventListener('click', e => {
    if (swiped) { swiped = false; return; }
    if (e.clientX < innerWidth * .3) show(i - 1);  // tap left edge = back
    else show(i + 1);
  });
  addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); show(i + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); show(i - 1); }
  });
</script>
</body>
</html>
